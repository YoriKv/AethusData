<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AETHUS · decoded tables</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Major+Mono+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #0a0c0f;
    --bg-deep:      #07090b;
    --surface:      #10141a;
    --surface-2:    #161c24;
    --surface-3:    #1b2330;
    --border:       #1d2530;
    --border-bright:#2c3849;
    --text:         #d8d3c3;
    --text-bright:  #f4ecd6;
    --text-dim:     #7d8693;
    --text-faint:   #4a525c;
    --accent:       #ff9d3a;
    --accent-deep:  #c2660d;
    --accent-glow:  #ffb86b;
    --positive:     #6ee087;
    --negative:     #ff5260;
    --cyan:         #58c8d8;
    --grid-line:    rgba(255, 157, 58, 0.045);

    --font-display: 'Major Mono Display', ui-monospace, monospace;
    --font-mono:    'JetBrains Mono', ui-monospace, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 1.5;
    height: 100%;
    -webkit-font-smoothing: antialiased;
  }

  body {
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px),
      radial-gradient(circle at 20% 0%, rgba(255, 157, 58, 0.04), transparent 50%);
    background-size: 80px 80px, 80px 80px, 100% 100%;
    background-attachment: fixed;
  }

  .layout {
    display: grid;
    grid-template-rows: auto 1fr;
    height: 100vh;
  }

  /* ---------- header ---------- */
  header.banner {
    padding: 18px 28px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 24px;
  }
  .banner__title {
    font-family: var(--font-display);
    font-size: 28px;
    line-height: 1;
    color: var(--text-bright);
    letter-spacing: -0.005em;
  }
  .banner__title .slash { color: var(--accent); }
  .banner__meta {
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 10px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--text-faint);
  }
  .banner__meta .pulse {
    width: 7px; height: 7px;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent-glow);
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: 0.25 } }

  /* ---------- body grid ---------- */
  .body {
    display: grid;
    grid-template-columns: 320px 1fr;
    overflow: hidden;
  }

  /* ---------- sidebar ---------- */
  aside.sidebar {
    border-right: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar__search {
    position: relative;
    border-bottom: 1px solid var(--border);
  }
  .sidebar__search input {
    width: 100%;
    background: var(--surface);
    border: none;
    border-left: 2px solid var(--accent);
    color: var(--text-bright);
    font-family: inherit;
    font-size: 13px;
    padding: 12px 14px 12px 52px;
    outline: none;
  }
  .sidebar__search input:focus { background: var(--surface-2); }
  .sidebar__search input::placeholder { color: var(--text-faint); }
  .sidebar__search::before {
    content: '⌕';
    position: absolute;
    left: 18px; top: 50%;
    transform: translateY(-50%);
    color: var(--accent);
    font-size: 16px;
    pointer-events: none;
  }

  .sidebar__list {
    overflow-y: auto;
    padding: 6px 0;
    flex: 1;
  }
  .sb-item {
    padding: 6px 14px 6px 22px;
    cursor: pointer;
    border-left: 2px solid transparent;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    transition: background 0.08s, border-color 0.08s;
    font-size: 12px;
  }
  .sb-item:hover { background: var(--surface-2); }
  .sb-item.active {
    background: var(--surface-3);
    border-left-color: var(--accent);
    color: var(--text-bright);
  }
  .sb-item__count {
    font-size: 10px;
    color: var(--text-faint);
    font-variant-numeric: tabular-nums;
  }
  .sb-item.empty .sb-item__count { color: var(--text-faint); opacity: 0.5; }

  /* ---------- main ---------- */
  main.main {
    overflow-y: auto;
    padding: 22px 28px 60px;
  }
  .main__placeholder {
    color: var(--text-faint);
    letter-spacing: 0.4em;
    text-align: center;
    margin-top: 25vh;
    font-size: 12px;
  }
  .main__placeholder::before { content: '[ '; color: var(--accent); }
  .main__placeholder::after  { content: ' ]'; color: var(--accent); }

  .table-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 24px;
    margin-bottom: 18px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .table-head h2 {
    font-family: var(--font-mono);
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 0.02em;
    line-height: 1;
    color: var(--text-bright);
  }
  .table-head h2 .prefix { color: var(--text-faint); }
  .table-head__meta {
    font-size: 10px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--text-faint);
  }
  .table-head__meta code {
    color: var(--text);
    background: var(--bg-deep);
    border: 1px solid var(--border);
    padding: 1px 6px;
    text-transform: none;
    letter-spacing: 0;
    margin-left: 6px;
    font-size: 11px;
  }
  .row-filter {
    margin-bottom: 16px;
    display: flex;
    gap: 10px;
    align-items: stretch;
    flex-wrap: wrap;
  }
  .row-filter input {
    flex: 1 1 320px;
    max-width: 460px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 2px solid var(--accent);
    color: var(--text-bright);
    font-family: inherit;
    font-size: 13px;
    padding: 9px 14px;
    outline: none;
  }
  .row-filter input:focus { background: var(--surface-2); border-color: var(--border-bright); }
  .expand-toggle {
    background: var(--surface);
    border: 1px solid var(--border-bright);
    color: var(--text-dim);
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    padding: 0 16px;
    cursor: pointer;
    transition: all 0.12s;
  }
  .expand-toggle:hover {
    color: var(--accent);
    border-color: var(--accent);
    background: var(--surface-2);
  }

  /* ---------- row blocks ---------- */
  .row {
    border: 1px solid var(--border);
    background: var(--surface);
    margin-bottom: 10px;
    overflow: hidden;
  }
  .row__head {
    background: var(--surface-3);
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    user-select: none;
    transition: background 0.08s;
  }
  .row__head:hover { background: var(--surface-2); }
  .row__toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 18px; height: 18px;
    border: 1px solid var(--border-bright);
    color: var(--text-dim);
    font-size: 10px;
    line-height: 1;
  }
  .row.open .row__toggle {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }
  .row__key {
    color: var(--accent);
    font-weight: 500;
    font-size: 12.5px;
    letter-spacing: 0.04em;
  }
  .row__body { display: none; padding: 12px 16px 16px; }
  .row.open .row__body { display: block; }

  .field {
    display: grid;
    grid-template-columns: minmax(180px, max-content) 1fr;
    gap: 10px 20px;
    padding: 4px 0;
    border-bottom: 1px dashed rgba(29,37,48,0.55);
  }
  .field:last-child { border-bottom: none; }
  .field__name {
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 0.04em;
  }
  .field__name .guid { color: var(--text-faint); opacity: 0.5; font-size: 10px; }
  .field__value { color: var(--text); min-width: 0; word-break: break-word; }

  /* ---------- value renderers ---------- */
  .v-none   { color: var(--text-faint); }
  .v-bool   { font-weight: 500; }
  .v-bool.v-true  { color: var(--positive); }
  .v-bool.v-false { color: var(--negative); }
  .v-num    { color: var(--cyan); font-variant-numeric: tabular-nums; }
  .v-str    { color: var(--text-bright); }
  .v-str::before, .v-str::after { content: '"'; color: var(--text-faint); }
  .v-id     { color: var(--accent); }
  .v-empty  { color: var(--text-faint); font-style: italic; }

  .v-nsloc {
    border-left: 2px solid var(--accent);
    padding: 4px 0 4px 10px;
    background: var(--bg-deep);
    margin: 2px 0;
  }
  .v-nsloc__display {
    color: var(--text-bright);
    font-size: 13px;
    white-space: pre-wrap;
  }
  .v-nsloc__meta {
    color: var(--text-faint);
    font-size: 10px;
    letter-spacing: 0.06em;
    margin-top: 4px;
  }
  .v-nsloc__meta code {
    background: transparent;
    color: var(--text-dim);
    padding: 0;
  }
  .v-nsloc.empty .v-nsloc__display { color: var(--text-faint); font-style: italic; }

  .v-array, .v-map {
    border: 1px solid var(--border);
    background: var(--bg-deep);
    padding: 4px 8px;
    margin: 2px 0;
  }
  .v-array { display: flex; flex-direction: column; gap: 2px; }
  .v-array__item {
    padding: 2px 6px;
    border-left: 2px solid var(--border-bright);
  }
  .v-array.inline { flex-direction: row; flex-wrap: wrap; gap: 4px; }
  .v-array.inline .v-array__item {
    border: none;
    padding: 2px 8px;
    background: var(--surface);
    border-left: 2px solid var(--accent-deep);
  }

  .v-map {
    display: grid;
    grid-template-columns: max-content 1fr;
    gap: 4px 14px;
    padding: 6px 10px;
  }
  .v-map__key   { color: var(--accent); font-weight: 500; }
  .v-map__val   { color: var(--text); }
  .v-map__count { color: var(--cyan); font-variant-numeric: tabular-nums; }

  .v-struct {
    border: 1px solid var(--border);
    background: var(--bg-deep);
    padding: 6px 10px;
    margin: 2px 0;
    display: grid;
    grid-template-columns: max-content 1fr;
    gap: 4px 14px;
  }
  .v-struct__name { color: var(--text-dim); font-size: 11px; }

  .v-raw {
    color: var(--text-faint);
    font-size: 11px;
    word-break: break-all;
  }

  /* ---------- responsive ---------- */
  @media (max-width: 760px) {
    .body { grid-template-columns: 1fr; grid-template-rows: 220px 1fr; }
    aside.sidebar { border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>
<div class="layout">

  <header class="banner">
    <div class="banner__title">decoded<span class="slash">/</span>tables</div>
    <div class="banner__meta">
      <span class="pulse"></span>
      <span>AETHUS · <span id="dt-count">—</span> tables</span>
      <span id="loaded">·</span>
    </div>
  </header>

  <div class="body">
    <aside class="sidebar">
      <div class="sidebar__search">
        <input type="search" id="sb-q" placeholder="filter tables…" autocomplete="off">
      </div>
      <div class="sidebar__list" id="sb-list"></div>
    </aside>
    <main class="main" id="main">
      <p class="main__placeholder">select a table</p>
    </main>
  </div>

</div>

<script>
(function () {
  'use strict';

  // ---------- bootstrap ----------------------------------------------------
  const $  = (s, c=document) => c.querySelector(s);
  const $$ = (s, c=document) => Array.from(c.querySelectorAll(s));

  let schemas = {};
  let currentTable = null;
  let currentData  = null;
  let rowFilter    = '';

  fetch('schemas.json')
    .then(r => r.json())
    .then(s => { schemas = s; renderSidebar(); })
    .catch(e => {
      $('#sb-list').innerHTML =
        `<p style="padding:14px;color:var(--negative);font-size:11px">failed to load schemas.json: ${e}</p>`;
    });

  // ---------- sidebar ------------------------------------------------------
  function renderSidebar(filter='') {
    const list = $('#sb-list');
    const names = Object.keys(schemas).sort();
    const q = filter.toLowerCase();
    const visible = q ? names.filter(n => n.toLowerCase().includes(q)) : names;
    $('#dt-count').textContent = names.length;
    list.innerHTML = visible.map(n => {
      const rows = schemas[n].rows ?? 0;
      const empty = rows === 0 ? ' empty' : '';
      const active = n === currentTable ? ' active' : '';
      return `<div class="sb-item${empty}${active}" data-name="${n}">
        <span>${escapeHtml(n.replace(/^DT_/, ''))}</span>
        <span class="sb-item__count">${rows}</span>
      </div>`;
    }).join('');
    $$('.sb-item', list).forEach(el => {
      el.addEventListener('click', () => loadTable(el.dataset.name));
    });
  }

  $('#sb-q').addEventListener('input', e => renderSidebar(e.target.value));

  // ---------- table loading ------------------------------------------------
  function loadTable(name) {
    currentTable = name;
    rowFilter = '';
    renderSidebar($('#sb-q').value);
    const main = $('#main');
    main.innerHTML = `<p class="main__placeholder">loading ${escapeHtml(name)}…</p>`;
    fetch(`decoded_text/${encodeURIComponent(name)}.json`)
      .then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
      })
      .then(data => {
        currentData = data;
        renderMain();
      })
      .catch(e => {
        main.innerHTML =
          `<p class="main__placeholder" style="color:var(--negative)">load failed: ${escapeHtml(String(e))}</p>`;
      });
  }

  // ---------- main render --------------------------------------------------
  function renderMain() {
    const data = currentData;
    if (!data) return;
    const rows = data.rows || {};
    const rowKeys = Object.keys(rows);

    const q = rowFilter.trim().toLowerCase();
    const visibleKeys = q
      ? rowKeys.filter(k => k.toLowerCase().includes(q)
          || JSON.stringify(rows[k]).toLowerCase().includes(q))
      : rowKeys;

    const headName = currentTable.startsWith('DT_')
      ? `<span class="prefix">DT_</span>${escapeHtml(currentTable.slice(3))}`
      : escapeHtml(currentTable);
    const head = `
      <div class="table-head">
        <h2>${headName}</h2>
        <div class="table-head__meta">
          rows <code>${rowKeys.length}</code>
          ${q ? `· visible <code>${visibleKeys.length}</code>` : ''}
        </div>
      </div>
      <div class="row-filter">
        <input type="search" id="row-q" placeholder="filter rows (key or field value)" autocomplete="off" value="${escapeHtml(rowFilter)}">
        <button class="expand-toggle" id="expand-toggle" type="button"></button>
      </div>
    `;

    const rowsHtml = visibleKeys.length
      ? visibleKeys.map(k => renderRow(k, rows[k])).join('')
      : `<p class="main__placeholder" style="margin-top:80px">no matches</p>`;

    const main = $('#main');
    main.innerHTML = head + rowsHtml;
    $('#row-q').addEventListener('input', e => {
      rowFilter = e.target.value;
      renderMain();
      // keep focus + cursor pos
      const el = $('#row-q');
      if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
    });

    // row toggle handlers
    $$('.row__head', main).forEach(h => {
      h.addEventListener('click', () => {
        h.parentElement.classList.toggle('open');
        updateExpandToggle();
      });
    });

    // expand/collapse-all button
    const toggleBtn = $('#expand-toggle');
    if (toggleBtn) {
      toggleBtn.addEventListener('click', () => {
        const anyCollapsed = !!main.querySelector('.row:not(.open)');
        $$('.row', main).forEach(r => r.classList.toggle('open', anyCollapsed));
        updateExpandToggle();
      });
      updateExpandToggle();
    }

    $('#loaded').textContent = `· ${currentTable} loaded`;
  }

  function updateExpandToggle() {
    const btn = $('#expand-toggle');
    if (!btn) return;
    const main = $('#main');
    const total = main.querySelectorAll('.row').length;
    const open  = main.querySelectorAll('.row.open').length;
    if (!total) { btn.style.display = 'none'; return; }
    btn.style.display = '';
    btn.textContent = open < total ? `+ expand all (${total})` : `− collapse all (${total})`;
  }

  function renderRow(key, fields) {
    const fieldRows = Object.keys(fields).sort().map(fname => {
      const v = parseValue(fields[fname] == null ? '' : String(fields[fname]));
      const { name, guid } = splitFieldName(fname);
      return `
        <div class="field">
          <div class="field__name">${escapeHtml(name)}${guid ? `<span class="guid"> ${escapeHtml(guid)}</span>` : ''}</div>
          <div class="field__value">${renderValue(v)}</div>
        </div>
      `;
    }).join('');
    return `
      <div class="row">
        <div class="row__head">
          <span class="row__toggle">+</span>
          <span class="row__key">${escapeHtml(key)}</span>
        </div>
        <div class="row__body">${fieldRows}</div>
      </div>
    `;
  }

  function splitFieldName(s) {
    const m = /^(.+?)(_\d+_[0-9A-Fa-f]+)$/.exec(s);
    return m ? { name: m[1], guid: m[2] } : { name: s, guid: '' };
  }

  // ---------- parser -------------------------------------------------------
  // ExportText values arrive as strings. We classify each into a typed
  // object so the renderer can show NSLOCTEXT display text, expand maps
  // and arrays, etc.
  function parseValue(s) {
    s = s.trim();
    if (s === '' || s === 'None')         return { type: 'none' };
    if (s === 'True'  || s === 'true')    return { type: 'bool', value: true };
    if (s === 'False' || s === 'false')   return { type: 'bool', value: false };
    if (s === '()')                       return { type: 'empty' };
    if (/^-?\d+(\.\d+)?$/.test(s))        return { type: 'number', value: parseFloat(s) };
    if (s.startsWith('NSLOCTEXT(')) {
      const r = parseNSLOCTEXT(s);
      if (r) return r;
    }
    if (s.startsWith('"') && s.endsWith('"') && s.length >= 2)
      return { type: 'string', value: unescape(s.slice(1, -1)) };
    if (s.startsWith('(') && s.endsWith(')')) {
      return parseGroup(s);
    }
    // bare identifier / enum name / asset path / hex
    return { type: 'identifier', value: s };
  }

  function parseNSLOCTEXT(s) {
    // NSLOCTEXT("ns", "key", "display text")
    // The three string args may contain escapes (\"  \\  \n etc).
    const m = /^NSLOCTEXT\(\s*"((?:[^"\\]|\\.)*)"\s*,\s*"((?:[^"\\]|\\.)*)"\s*,\s*"((?:[^"\\]|\\.)*)"\s*\)$/.exec(s);
    if (!m) return null;
    return {
      type: 'nsloctext',
      ns:      unescape(m[1]),
      key:     unescape(m[2]),
      display: unescape(m[3]),
    };
  }

  function parseGroup(s) {
    const inner = s.slice(1, -1).trim();
    if (!inner) return { type: 'empty' };
    const parts = splitTopLevel(inner);

    // struct: every part has top-level Identifier=
    if (parts.every(p => /^[A-Za-z_][A-Za-z0-9_]*\s*=/.test(p))) {
      return {
        type: 'struct',
        fields: parts.map(p => {
          const eq = p.indexOf('=');
          return { name: p.slice(0, eq).trim(), value: parseValue(p.slice(eq + 1)) };
        }),
      };
    }

    // map: every part is itself a 2-element (key, value) pair
    const asPairs = parts.map(p => {
      if (!(p.startsWith('(') && p.endsWith(')'))) return null;
      const pi = splitTopLevel(p.slice(1, -1));
      return pi.length === 2 ? pi : null;
    });
    if (asPairs.every(p => p !== null)) {
      return {
        type: 'map',
        entries: asPairs.map(([k, v]) => ({
          key: parseValue(k),
          value: parseValue(v),
        })),
      };
    }

    // otherwise: array
    return { type: 'array', items: parts.map(parseValue) };
  }

  function splitTopLevel(s) {
    const out = [];
    let depth = 0, start = 0, inStr = false;
    for (let i = 0; i < s.length; i++) {
      const c = s[i];
      if (inStr) {
        if (c === '\\' && i + 1 < s.length) { i++; continue; }
        if (c === '"') inStr = false;
        continue;
      }
      if (c === '"') inStr = true;
      else if (c === '(') depth++;
      else if (c === ')') depth--;
      else if (c === ',' && depth === 0) {
        out.push(s.slice(start, i).trim());
        start = i + 1;
      }
    }
    const tail = s.slice(start).trim();
    if (tail) out.push(tail);
    return out;
  }

  function unescape(s) {
    return s.replace(/\\(.)/g, (_, c) => {
      if (c === 'n') return '\n';
      if (c === 'r') return '\r';
      if (c === 't') return '\t';
      return c;
    });
  }

  // ---------- renderers ----------------------------------------------------
  function renderValue(v) {
    switch (v.type) {
      case 'none':       return '<span class="v-none">—</span>';
      case 'empty':      return '<span class="v-empty">( empty )</span>';
      case 'bool':       return `<span class="v-bool v-${v.value}">${v.value}</span>`;
      case 'number':     return `<span class="v-num">${v.value}</span>`;
      case 'string':     return `<span class="v-str">${escapeHtml(v.value)}</span>`;
      case 'identifier': return `<span class="v-id">${escapeHtml(v.value)}</span>`;

      case 'nsloctext': {
        const isEmpty = !v.display;
        return `<div class="v-nsloc${isEmpty ? ' empty' : ''}">
          <div class="v-nsloc__display">${escapeHtml(v.display || '(empty)')}</div>
          <div class="v-nsloc__meta">
            ns <code>${escapeHtml(v.ns)}</code> · key <code>${escapeHtml(v.key)}</code>
          </div>
        </div>`;
      }

      case 'array': {
        const allPrimitive = v.items.every(i =>
          ['number','bool','identifier','string'].includes(i.type));
        const inline = allPrimitive && v.items.length <= 12;
        const cls = 'v-array' + (inline ? ' inline' : '');
        return `<div class="${cls}">${
          v.items.map(i => `<div class="v-array__item">${renderValue(i)}</div>`).join('')
        }</div>`;
      }

      case 'map': {
        // Common case: map<FName, int> — render with "Key × N" semantics.
        const allCounted = v.entries.every(e =>
          e.value.type === 'number'
          && (e.key.type === 'string' || e.key.type === 'identifier'));
        return `<div class="v-map">${
          v.entries.map(e => allCounted
            ? `<div class="v-map__key">${renderValue(e.key)}</div>
               <div class="v-map__val"><span class="v-map__count">× ${e.value.value}</span></div>`
            : `<div class="v-map__key">${renderValue(e.key)}</div>
               <div class="v-map__val">${renderValue(e.value)}</div>`
          ).join('')
        }</div>`;
      }

      case 'struct': {
        return `<div class="v-struct">${
          v.fields.map(f =>
            `<div class="v-struct__name">${escapeHtml(f.name)}</div>
             <div>${renderValue(f.value)}</div>`).join('')
        }</div>`;
      }

      default:
        return `<span class="v-raw">${escapeHtml(String(v.value ?? ''))}</span>`;
    }
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ---------- keyboard -----------------------------------------------------
  document.addEventListener('keydown', e => {
    if (e.key === '/' && !/^(INPUT|TEXTAREA)$/.test(document.activeElement.tagName)) {
      e.preventDefault();
      const target = $('#row-q') || $('#sb-q');
      if (target) { target.focus(); target.select(); }
    } else if (e.key === 'Escape' && document.activeElement.tagName === 'INPUT') {
      const el = document.activeElement;
      el.value = '';
      el.dispatchEvent(new Event('input'));
      el.blur();
    }
  });
})();
</script>
</body>
</html>
